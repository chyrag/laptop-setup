# Prefix: C-o
unbind C-b
set-option -g prefix C-o
bind-key C-o last-window

# General
set -g default-terminal "tmux-256color"
set -g history-limit 10000
set -g detach-on-destroy off
set -g focus-events on
set -gq allow-passthrough on
set -g remain-on-exit off
setw -g aggressive-resize on
set -g status-interval 5

# Activity
set -g monitor-activity on
set -g visual-activity off

# Linux-only: DBus and XDG runtime (no-ops on macOS)
if-shell 'test -S /run/user/1000/bus' \
    'set-environment -g DBUS_SESSION_BUS_ADDRESS "unix:path=/run/user/1000/bus"; \
     set-environment -g XDG_RUNTIME_DIR "/run/user/1000"'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Dracula theme
set -g @dracula-show-powerline true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-plugins "cpu-usage ram-usage"
set -g @dracula-refresh-rate 5
set -g @dracula-military-time true
set -g @dracula-border-contrast true
set -g @dracula-show-fahrenheit false
set -g @dracula-show-empty-plugins false
set -g @dracula-fixed-location "Bengaluru"
set -g @dracula-show-location false

# tmux-resurrect
set -g @resurrect-processes 'emacs'
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Wide enough for: Dracula cpu/ram widgets + time + hostname
set -g status-right-length 100

# Initialize TPM (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Append time AFTER TPM so this runs after Dracula sets status-right.
# %%H:%%M — tmux expands %% → % before the shell runs, so the shell receives
# `date +%H:%M`. Do NOT use quoted '%H:%M' inside #(); tmux expands those too,
# turning the format into a literal time string before the shell ever runs.
set -ag status-right "#[fg=colour250,bg=colour238,bold] %H:%M IST  #(TZ=UTC date +%%H:%%M) UTC  #H "
