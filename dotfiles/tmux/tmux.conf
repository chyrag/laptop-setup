# Prefix: C-o
unbind C-b
set-option -g prefix C-o
bind-key C-o last-window

# General
set -g default-terminal "tmux-256color"
set -g history-limit 10000
set -g detach-on-destroy off
set -g focus-events on
set -gq allow-passthrough on
set -g remain-on-exit off
set -g renumber-windows on
setw -g aggressive-resize on
set -g status-interval 5

# Activity monitoring
set -g monitor-activity on
set -g visual-activity off

# Linux-only: DBus and XDG runtime (no-ops on macOS)
if-shell 'test -S /run/user/1000/bus' \
    'set-environment -g DBUS_SESSION_BUS_ADDRESS "unix:path=/run/user/1000/bus"; \
     set-environment -g XDG_RUNTIME_DIR "/run/user/1000"'

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ── Catppuccin (mocha) ────────────────────────────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "default"

# Window title icons:
#   ●  (U+25CF) current window  — filled circle, styled by Catppuccin's active color
#   ○  (U+25CB) last window     — hollow circle
#   ⚡ (U+26A1) activity        — high-visibility, yellow text
# window_activity_flag / window_last_flag are standard tmux format variables.
set -g @catppuccin_window_text \
  "#{?window_activity_flag,#[fg=#f9e2af]⚡ ,#{?window_last_flag,○ ,}}#W"
set -g @catppuccin_window_current_text "● #W"

# ── tmux-cpu: Catppuccin mocha color thresholds ───────────────────────────────
# Foreground color of the percentage changes with load; background is always default.
set -g @cpu_low_fg_color    "#[fg=#a6e3a1]"   # mocha green
set -g @cpu_medium_fg_color "#[fg=#f9e2af]"   # mocha yellow
set -g @cpu_high_fg_color   "#[fg=#f38ba8]"   # mocha red
set -g @cpu_low_bg_color    "#[bg=default]"   # mocha surface0
set -g @cpu_medium_bg_color "#[bg=default]"
set -g @cpu_high_bg_color   "#[bg=default]"
set -g @ram_low_fg_color    "#[fg=#a6e3a1]"
set -g @ram_medium_fg_color "#[fg=#f9e2af]"
set -g @ram_high_fg_color   "#[fg=#f38ba8]"
set -g @ram_low_bg_color    "#[bg=default]"
set -g @ram_medium_bg_color "#[bg=default]"
set -g @ram_high_bg_color   "#[bg=default]"

# ── tmux-resurrect ────────────────────────────────────────────────────────────
set -g @resurrect-processes 'emacs'
set -g @resurrect-capture-pane-contents 'on'

# ── tmux-continuum ────────────────────────────────────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── TPM — keep at the very bottom ────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# Transparent status bar — show terminal default bg between segments.
set -g status-style "bg=default"

# ── Post-TPM: status-left and status-right ───────────────────────────────────
# We own both ends; Catppuccin owns the window list in the middle.
#
# status-left: session name, no brackets, muted green (#4a7c59) background.
set -g status-left-length 40
set -g status-left "#[fg=#4a7c59,bg=default]#[fg=#cdd6f4,bg=#4a7c59,bold] #S #[fg=#4a7c59,bg=default]#[default]"

set -g window-status-activity-style ""

# Window status format — bypasses Catppuccin's format to use bg=default for
# rounded caps, removing the dark edge that appears with a transparent status bar.
# @thm_surface_1 = inactive pill bg, @thm_mauve = active pill bg (set by Catppuccin).
set -g window-status-format         "#[fg=#45475a,bg=default]#[fg=#cdd6f4,bg=#45475a] #I #{?window_activity_flag,#[fg=#f9e2af]⚡ #[fg=#cdd6f4],#{?window_last_flag,○ ,}}#W #[fg=#45475a,bg=default]#[default]"
set -g window-status-current-format "#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7,bold] #I ● #W #[fg=#cba6f7,bg=default]#[default]"

# status-right: CPU, RAM, IST time, UTC time, hostname.
#
# Nerd Font icons (Meslo LGS NF required):
#   nf-fa-microchip U+F2DB — CPU
#   nf-fa-memory    U+F538 — RAM
#
# %%H:%%M — tmux expands %% → % before the shell runs, so the shell
# receives `date +%H:%M` rather than a literal time string.
set -g status-right-length 150
set -g status-right \
  "#{cpu_fg_color} #{cpu_percentage} #{ram_fg_color} #{ram_percentage}#[fg=#cdd6f4,bg=default,bold]   %H:%M IST  #(TZ=UTC date +%%H:%%M) UTC  #{b:pane_current_path} "

# tmux-cpu replaces #{cpu_percentage} etc. during its own init, which runs
# before our status-right override above. Re-running its init makes it process
# our custom status-right string.
run-shell "~/.tmux/plugins/tmux-cpu/cpu.tmux"
